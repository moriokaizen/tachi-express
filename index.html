<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACHI EXPRESS - Protótipo</title>
    
    <link rel="icon" type="image/png" href="tachi-icon.png">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00ff88;
            --danger: #ff4d4d;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 375px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* CABEÇALHO COM LOGO */
        .brand-header {
            margin-bottom: 20px;
        }

        .logo-img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3));
        }

        /* CARD DO USUÁRIO COM FOTO */
        .user-card {
            background: var(--card);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-container {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            margin: 0 auto 15px auto;
            overflow: hidden;
            background: #1e293b;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name { font-size: 1.3rem; font-weight: 700; margin: 0; }
        .user-company { color: var(--primary); font-size: 0.9rem; font-weight: 600; margin: 5px 0; }
        .user-unit { font-size: 0.8rem; opacity: 0.6; margin: 0; }

        /* STATUS GPS */
        .gps-status {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            padding: 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* BOTÕES DE PONTO COM KANJIS */
        .btn-group {
            display: grid;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.96); }

        .btn-in { background: var(--primary); color: #062014; }
        .btn-out { background: var(--danger); color: white; }

        .jp-label { 
            font-size: 0.8rem; 
            font-weight: 400; 
            display: block; 
            margin-top: 2px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.6rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brand-header">
            <img src="tachi-logo-full.png" alt="Tachi Express" class="logo-img">
        </header>

        <section class="user-card">
            <div class="avatar-container">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Morio" alt="Foto" class="avatar-img">
            </div>
            <h2 class="user-name">Kitajima Morio</h2>
            <p class="user-company">Konishi Sangyo | ID: 00107</p>
            <p class="user-unit">Unidade: Sumitomo</p>
        </section>

        <div class="gps-status">
            <i data-lucide="map-pin" size="14"></i>
            LOCALIZAÇÃO VALIDADA: SUMITOMO FACTORY
        </div>

        <div class="btn-group">
            <button class="btn btn-in">
                <i data-lucide="play-circle"></i>
                <div>
                    ENTRADA
                    <span class="jp-label">出勤 (SHUKKIN)</span>
                </div>
            </button>

            <button class="btn btn-out">
                <i data-lucide="stop-circle"></i>
                <div>
                    SAÍDA
                    <span class="jp-label">退勤 (TAIKIN)</span>
                </div>
            </button>
        </div>

        <footer class="footer">
            TACHI EXPRESS v1.0.8 | 2026
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
