<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACHI EXPRESS</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00ff88; --danger: #ff4d4d; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app { width: 350px; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .logo-img { width: 220px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,255,136,0.2)); }
        .user-card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }
        .user-name { font-size: 1.3rem; font-weight: bold; margin: 0; }
        .user-info { color: var(--primary); font-size: 0.9rem; font-weight: bold; margin: 5px 0; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-in { background: var(--primary); color: #000; }
        .btn-out { background: var(--danger); color: #fff; }
        .jp { font-size: 0.75rem; display: block; font-weight: 400; }
    </style>
</head>
<body>
    <div class="app">
        <img src="logo.png" class="logo-img" alt="Tachi Express">
        
        <div class="user-card">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Morio" class="avatar">
            <p class="user-name">Kitajima Morio</p>
            <p class="user-info">Konishi Sangyo | ID: 00107</p>
            <p style="font-size: 0.8rem; opacity: 0.6;">Unidade: Sumitomo</p>
        </div>

        <button class="btn btn-in">
            <i data-lucide="play-circle"></i>
            <div>ENTRADA <span class="jp">出勤 (SHUKKIN)</span></div>
        </button>
        
        <button class="btn btn-out">
            <i data-lucide="stop-circle"></i>
            <div>SAÍDA <span class="jp">退勤 (TAIKIN)</span></div>
        </button>
        
        <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 20px; font-weight: bold;">
            <i data-lucide="map-pin" size="12"></i> LOCALIZAÇÃO VALIDADA: SUMITOMO FACTORY
        </p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
